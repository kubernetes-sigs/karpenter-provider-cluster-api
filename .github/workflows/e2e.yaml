name: e2e
on:
  pull_request:
    branches: [ "main" ]
jobs:
  e2e:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    name: e2e
    steps:
      # we sometimes run out of space on the runner after build, this sometimes corrupts the karpenter image build
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # tag=v1.3.1
      with:
        docker-images: false
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag=v6.4.0
      with:
        go-version: '1.25'
    - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # tag=v1.14.0
      with:
        install_only: true
    - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # tag=v0.9
    - name: Setup CAPK management and tenant clusters
      shell: bash
      run: |
        ./test/hack/e2e.sh
      env:
        KIND_CLUSTER_IMAGE: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1
    - name: install controller
      shell: bash
      run: |
        export KUBECONFIG=/tmp/km.kubeconfig
        export KWOK_REPO=kind.local
        export KIND_CLUSTER_NAME=km-cp
        make apply
    - name: ping cluster
      shell: bash
      run: |
        export KUBECONFIG=/tmp/km.kubeconfig
        sleep 15
        kubectl get pods -n kube-system | grep karpenter
        kubectl get nodepools
        kubectl get pods -A
        kubectl describe nodes
    - name: run test suites
      shell: bash
      run: |
        export KUBECONFIG=/tmp/km.kubeconfig
        kubectl taint nodes --selector='node-role.kubernetes.io/control-plane' CriticalAddonsOnly:NoSchedule
        make upstream-e2etests
    - name: cleanup 
      shell: bash
      run: | 
        kind delete cluster --name km-cp
        kind delete cluster --name kind
