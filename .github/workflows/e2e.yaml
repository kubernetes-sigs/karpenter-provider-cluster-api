name: e2e
on:
  pull_request:
    branches: [ "main" ]
jobs:
  e2e:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    name: e2e
    steps:
      # we sometimes run out of space on the runner after build, this sometimes corrupts the karpenter image build
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # tag=v1.3.1
      with:
        docker-images: false
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # tag=v6.5.0
      with:
        go-version: '1.25'
    - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # tag=v1.14.0
      with:
        install_only: true
    - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # tag=v0.10
    - name: Setup CAPK management and tenant clusters
      shell: bash
      run: |
        ./test/hack/e2e.sh
      env:
        KIND_CLUSTER_IMAGE: kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1
    - name: cleanup 
      shell: bash
      run: | 
        kind delete cluster --name km-cp
        kind delete cluster
